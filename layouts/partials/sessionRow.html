<tr>
    <td>
        <p class="lead">{{ .session.time }}</p>
    </td>
    <td>
        <p class="lead">
            {{ .session.title }}
        </p>
        <p>
            {{ $siteData := .siteData }}
            {{ range $k, $v := .session.speakers }}
                {{ $speaker := index $siteData.speakers $v }}
                <div style="display: inline-block; padding-right: 1rem;">
                    <img src="/speakers/{{ $speaker.photo }}" class="rounded-circle" style="width: 50px; height: 50px; object-fit: cover;">
                    <a class="link-dark" href="#" data-bs-toggle="modal" data-bs-target="#speaker-{{ $speaker.key }}" >{{ $speaker.name }}</a>
                </div>
            {{ end }}
        </p>
        <p>
            <span class="badge rounded-pill text-bg-primary">{{ .session.duration }}</span>
        </p>
    </td>
</tr>
